name: finmate
description: "FinMate — Track. Plan. Save. A fully offline personal finance manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local database (Drift = SQLite, actively maintained, fully offline)
  drift: ^2.19.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Charts
  fl_chart: ^0.68.0

  # File import / statement parsing (all offline, no cloud calls)
  file_picker: ^8.0.6
  csv: ^6.0.0
  excel: ^4.0.3
  read_pdf_text: ^0.3.1
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # Export
  pdf: ^3.11.0
  printing: ^5.13.1
  share_plus: ^9.0.0

  # Local notifications & background work
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  workmanager: ^0.5.2

  # Preferences & security
  shared_preferences: ^2.2.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  crypto: ^3.0.5
  equatable: ^2.0.5
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.19.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
