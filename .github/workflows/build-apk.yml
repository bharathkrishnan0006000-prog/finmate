name: Build APK

# Builds an installable APK automatically — no local Flutter/Android setup
# needed. Push this project to a GitHub repo and this runs for you.
#
# The Android platform folder is generated once (if missing) and then
# committed back into the repo, so it's a permanent, visible part of your
# project afterwards instead of being silently regenerated and discarded
# in every run.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Uses whatever is currently the stable Flutter release, so the
      # generated Android project always gets a Kotlin/AGP/compileSdk
      # combination that matches the plugins in pubspec.yaml.
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Scaffold platform folders if missing
        id: scaffold
        run: |
          if [ ! -d "android" ]; then
            flutter create --org com.finmate --project-name finmate --platforms=android .
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch Android config (SDK versions, Kotlin, permissions)
        run: |
          # Support both Groovy DSL (build.gradle) and Kotlin DSL (build.gradle.kts)
          for GRADLE_FILE in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$GRADLE_FILE" ]; then
              sed -i 's/flutter\.minSdkVersion/23/g' "$GRADLE_FILE" || true
              sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 23/g' "$GRADLE_FILE" || true
              sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/g' "$GRADLE_FILE" || true
              sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 36/g' "$GRADLE_FILE" || true
              # Enable core library desugaring (required by flutter_local_notifications)
              sed -i 's/sourceCompatibility = JavaVersion\.VERSION_17/sourceCompatibility = JavaVersion.VERSION_17\n        isCoreLibraryDesugaringEnabled = true/g' "$GRADLE_FILE" || true
            fi
          done

          # Add desugar dependency if not already present
          APP_GRADLE=android/app/build.gradle.kts
          if [ -f "$APP_GRADLE" ] && ! grep -q "desugar_jdk_libs" "$APP_GRADLE"; then
            echo '' >> "$APP_GRADLE"
            echo 'dependencies {' >> "$APP_GRADLE"
            echo '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' >> "$APP_GRADLE"
            echo '}' >> "$APP_GRADLE"
          fi

          # Bump the Kotlin Gradle plugin version regardless of what the
          # Flutter template shipped with — this is the exact fix for the
          # "Module was compiled with an incompatible version of Kotlin"
          # error, which happens when the project's Kotlin plugin is
          # older than what plugins like shared_preferences require.
          for SETTINGS_FILE in android/settings.gradle android/settings.gradle.kts; do
            if [ -f "$SETTINGS_FILE" ]; then
              sed -i -E 's/(id\("org\.jetbrains\.kotlin\.android"\) version ")[^"]+(")/\12.1.0\2/' "$SETTINGS_FILE" || true
              sed -i -E 's/(id "org\.jetbrains\.kotlin\.android" version ")[^"]+(")/\12.1.0\2/' "$SETTINGS_FILE" || true
            fi
          done

          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ] && ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i 's#<manifest xmlns:android="http://schemas.android.com/apk/res/android">#<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n    <uses-permission android:name="android.permission.CAMERA"/>#' "$MANIFEST"
          fi

      - name: Commit generated Android project files
        if: steps.scaffold.outputs.generated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android .metadata analysis_options.yaml .gitignore 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: add generated Android platform files [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Re-patch Kotlin version after Flutter upgrade
        # flutter build rewrites settings.gradle.kts via "Upgrading build.gradle.kts",
        # which can downgrade the Kotlin version. Re-apply the patch right before building.
        run: |
          for SETTINGS_FILE in android/settings.gradle android/settings.gradle.kts; do
            if [ -f "$SETTINGS_FILE" ]; then
              sed -i -E 's/(id\("org\.jetbrains\.kotlin\.android"\) version ")[^"]+(")/\12.2.20\2/' "$SETTINGS_FILE" || true
              sed -i -E 's/(id "org\.jetbrains\.kotlin\.android" version ")[^"]+(")/\12.2.20\2/' "$SETTINGS_FILE" || true
            fi
          done

      - name: Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: finmate-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
